<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>计数器插件</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow: hidden;
    }

    .counter-container {
      background: white;
      border-radius: 16px;
      padding: 24px 32px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      text-align: center;
    }

    .counter-title {
      font-size: 14px;
      color: #666;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .counter-value {
      font-size: 48px;
      font-weight: bold;
      color: #333;
      margin: 16px 0;
      transition: transform 0.15s ease;
    }

    .counter-value.bump {
      transform: scale(1.1);
    }

    .counter-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 16px;
    }

    .btn {
      width: 48px;
      height: 48px;
      border: none;
      border-radius: 50%;
      font-size: 24px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-minus {
      background: #ff6b6b;
      color: white;
    }

    .btn-minus:hover {
      background: #ee5a5a;
      transform: scale(1.1);
    }

    .btn-plus {
      background: #4ecdc4;
      color: white;
    }

    .btn-plus:hover {
      background: #3dbdb5;
      transform: scale(1.1);
    }

    .btn-reset {
      background: #f0f0f0;
      color: #666;
      font-size: 14px;
    }

    .btn-reset:hover {
      background: #e0e0e0;
    }

    .info {
      font-size: 12px;
      color: #999;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="counter-container">
    <div class="counter-title">计数器</div>
    <div class="counter-value" id="value">0</div>
    <div class="counter-buttons">
      <button class="btn btn-minus" id="btnMinus">−</button>
      <button class="btn btn-reset" id="btnReset">重置</button>
      <button class="btn btn-plus" id="btnPlus">+</button>
    </div>
    <div class="info" id="info">步长: 1 | 范围: -100 ~ 100</div>
  </div>

  <script>
    // 插件运行时 - 由 EditLite 提供
    // PluginRuntime.directiveName - 当前指令名称
    // PluginRuntime.args - 指令参数
    // PluginRuntime.updateState(state) - 更新状态
    // PluginRuntime.reportError(message) - 报告错误

    // 获取参数（带默认值）
    const args = PluginRuntime.getResolvedArgs ? PluginRuntime.getResolvedArgs() : {
      initialValue: 0,
      step: 1,
      min: -100,
      max: 100,
      ...(PluginRuntime.args || {})
    };

    // 计数器状态
    let count = args.initialValue;

    // DOM 元素
    const valueEl = document.getElementById('value');
    const btnMinus = document.getElementById('btnMinus');
    const btnPlus = document.getElementById('btnPlus');
    const btnReset = document.getElementById('btnReset');
    const infoEl = document.getElementById('info');

    // 更新显示
    function updateDisplay() {
      valueEl.textContent = count;

      // 添加动画效果
      valueEl.classList.add('bump');
      setTimeout(() => valueEl.classList.remove('bump'), 150);

      // 更新按钮状态
      btnMinus.disabled = count <= args.min;
      btnPlus.disabled = count >= args.max;

      // 通知父窗口状态变化
      if (PluginRuntime.updateState) {
        PluginRuntime.updateState({
          status: 'playing',
          data: { value: count }
        });
      }
    }

    // 更新信息显示
    function updateInfo() {
      infoEl.textContent = `步长: ${args.step} | 范围: ${args.min} ~ ${args.max}`;
    }

    // 事件处理
    btnPlus.addEventListener('click', () => {
      if (count + args.step <= args.max) {
        count += args.step;
        updateDisplay();
      }
    });

    btnMinus.addEventListener('click', () => {
      if (count - args.step >= args.min) {
        count -= args.step;
        updateDisplay();
      }
    });

    btnReset.addEventListener('click', () => {
      count = args.initialValue;
      updateDisplay();
    });

    // 初始化
    updateDisplay();
    updateInfo();

    // 参数更新回调（当用户修改 Markdown 参数时触发）
    window.onArgsUpdate = function(newArgs) {
      Object.assign(args, newArgs);
      count = args.initialValue;
      updateDisplay();
      updateInfo();
    };

    // 通知插件加载完成
    if (PluginRuntime.updateState) {
      PluginRuntime.updateState({
        status: 'idle',
        data: { value: count }
      });
    }
  </script>
</body>
</html>
